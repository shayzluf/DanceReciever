<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Floored TV</title>
  <!-- ?v= cache-busts the JS/CSS on the Cast device when this index reloads; bump it (and BUILD in
       receiver.js) on every receiver change so a stale device can't silently serve old code. -->
  <link rel="stylesheet" href="styles.css?v=jun11-lobby">
  <!-- Google Cast Application Framework (CAF) receiver SDK -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <!-- The song plays here. crossorigin lets it be routed through the WebAudio graph (mixed with the
       feedback tones in one output stream). Requires CORS (GET) on the audio origin (R2). -->
  <audio id="song" preload="auto" crossorigin="anonymous"></audio>

  <!-- The COACH STAGE: a constrained region holding whichever coach is active (drawn figure / the user's
       silent clip / a platform embed). It is sized to a sub-region (centre column in portrait, top band in
       landscape) so the feedback rail can sit BESIDE/UNDER it — we never draw feedback on the video. -->
  <div id="videostage">
    <!-- Figure mode: the coach is drawn here from the streamed pose timeline. -->
    <canvas id="coach"></canvas>
    <!-- Embed mode: the routine's platform video (YouTube/TikTok/Vimeo) plays here with its own sound. -->
    <div id="embed"></div>
    <!-- Video mode: the user's *silent* recorded clip (staged ephemerally on R2) plays here as the coach;
         the licensed catalog mp3 plays from #song, synced. object-fit:contain (NEVER cover — no cropping). -->
    <video id="castvideo" muted playsinline webkit-playsinline></video>
    <!-- Dev-only debug skeleton overlay: draws the reference pose ON the clip to verify alignment/mirror/
         sync. OFF by default (enable with ?debug=1 / DNTestDebug / the phone toggle); never ships enabled. -->
    <canvas id="dbgskeleton"></canvas>
  </div>

  <!-- The FEEDBACK RAIL: the move filmstrip ("now / next" pictograms) + per-player score chips. Sits in the
       right pillar for portrait clips, as a bottom strip for landscape clips. Never overlaps the video. -->
  <div id="rail">
    <div id="railscores" class="railscores"></div>
    <div id="filmstrip"></div>
  </div>

  <!-- Ambient edge-glow (figure mode legacy; retired in favour of the rail flash). -->
  <div id="glow" class="glow"></div>

  <!-- Big rating word (legacy; retired in favour of the rail flash). -->
  <div id="wordwrap"><div id="word"></div></div>

  <!-- Legacy corner scoreboard (unused; scores now render into #railscores). -->
  <div id="scores" class="scores"></div>

  <!-- Big final-score reveal at the end of a cast round (exact total, in sync with the phone). -->
  <div id="final" class="final"><div class="final-title">FINAL</div><div class="final-scores"></div></div>

  <!-- "Get Ready" countdown on the TV (5..1, GO!). -->
  <div id="getready" class="getready"><div class="gr-num"></div></div>

  <!-- "Set up your stage" framing / paused screen: the live skeleton inside a safe-zone + one instruction. -->
  <div id="stage" class="stage">
    <div class="stage-title"></div>
    <div class="stage-box"><canvas id="stagecanvas"></canvas><div class="stage-safe"></div></div>
    <div class="stage-instr"></div>
  </div>

  <!-- In-round "come back" nudges — one chip per out-of-frame player. -->
  <div id="guard" class="guard"></div>

  <!-- Idle "lobby": the bystander-acquisition QR shown whenever no routine is active (the In-Room QR
       loop). Anyone in the room can scan it to install Floored. Hidden the moment a routine starts.
       The status line at the bottom serves the CASTER (waiting vs connected — what to do next), so the
       idle screen guides both audiences at once. -->
  <div id="lobby" class="lobby">
    <div class="lobby-brand">Floored</div>
    <div class="lobby-head">Dance on the big screen</div>
    <div class="lobby-qr"><img src="floored-qr.png" alt="Scan to get Floored"></div>
    <div class="lobby-cta">Point your phone camera here · floored.me</div>
    <div id="lobbystatus" class="lobby-status"></div>
  </div>

  <div id="hud" class="hud">
    <div class="brand">Floored</div>
    <div id="status">waiting for a phone to connect…</div>
  </div>

  <!-- Build stamp (faint, bottom-right): proves which receiver version the TV actually loaded. If this
       is missing or wrong after a deploy, the Cast device is serving a cached app → reboot it. -->
  <div id="build" style="position:fixed; right:10px; bottom:8px; font:11px/1 monospace; opacity:0.4; color:#fff; z-index:9;"></div>

  <script src="receiver.js?v=jun11-lobby"></script>
</body>
</html>

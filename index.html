<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>DanceNow TV</title>
  <!-- ?v= cache-busts the JS/CSS on the Cast device when this index reloads; bump it (and BUILD in
       receiver.js) on every receiver change so a stale device can't silently serve old code. -->
  <link rel="stylesheet" href="styles.css?v=jun5-video7">
  <!-- Google Cast Application Framework (CAF) receiver SDK -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <!-- The song plays here. crossorigin lets it be routed through the WebAudio graph (mixed with the
       feedback tones in one output stream). Requires CORS (GET) on the audio origin (R2). -->
  <audio id="song" preload="auto" crossorigin="anonymous"></audio>

  <!-- The coach figure is rendered here, from the pose timeline the phone streams, synced to the song. -->
  <canvas id="coach"></canvas>

  <!-- Embed mode: the routine's platform video (YouTube/TikTok/Vimeo) plays here with its own sound. -->
  <div id="embed" style="position:fixed; inset:0; width:100%; height:100%; border:0; display:none; background:#000;"></div>

  <!-- Video mode (local catalog routine): the user's *silent* recorded clip (staged ephemerally on R2)
       plays here as the coach; the licensed catalog mp3 plays from #song, synced. Our own content, so
       feedback overlays (glow/word/scores, which sit above this at higher z-index) ARE allowed. -->
  <video id="castvideo" muted playsinline webkit-playsinline
         style="position:fixed; inset:0; width:100%; height:100%; object-fit:contain; display:none; background:#000; z-index:1;"></video>

  <!-- Ambient edge-glow that flashes on each judged moment. -->
  <div id="glow" class="glow"></div>

  <!-- Big rating word ("PERFECT  +250"), centered. -->
  <div id="wordwrap"><div id="word"></div></div>

  <!-- Per-player scoreboard. -->
  <div id="scores" class="scores"></div>

  <!-- Big final-score reveal at the end of a cast round (exact total, in sync with the phone). -->
  <div id="final" class="final"><div class="final-title">FINAL</div><div class="final-scores"></div></div>

  <!-- "Get Ready" countdown on the TV (5..1, GO!). -->
  <div id="getready" class="getready"><div class="gr-num"></div></div>

  <!-- "Set up your stage" framing / paused screen: the live skeleton inside a safe-zone + one instruction. -->
  <div id="stage" class="stage">
    <div class="stage-title"></div>
    <div class="stage-box"><canvas id="stagecanvas"></canvas><div class="stage-safe"></div></div>
    <div class="stage-instr"></div>
  </div>

  <!-- In-round "come back" nudges — one chip per out-of-frame player. -->
  <div id="guard" class="guard"></div>

  <div id="hud" class="hud">
    <div class="brand">DanceNow</div>
    <div id="status">waiting for a phone to connect…</div>
  </div>

  <!-- Build stamp (faint, bottom-right): proves which receiver version the TV actually loaded. If this
       is missing or wrong after a deploy, the Cast device is serving a cached app → reboot it. -->
  <div id="build" style="position:fixed; right:10px; bottom:8px; font:11px/1 monospace; opacity:0.4; color:#fff; z-index:9;"></div>

  <script src="receiver.js?v=jun5-video7"></script>
</body>
</html>
